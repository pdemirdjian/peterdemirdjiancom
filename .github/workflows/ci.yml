name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get Hugo version from netlify.toml
        run: |
          HUGO_VERSION=$(grep 'HUGO_VERSION' netlify.toml | cut -d'"' -f2)
          echo "HUGO_VERSION=${HUGO_VERSION}" >> $GITHUB_ENV

      - name: Install Hugo
        run: |
          wget -q -O hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb
          rm hugo.deb
          hugo version

      - name: Build website
        run: hugo

      - name: Verify required output structure
        run: |
          test -f public/index.html || { echo "MISSING: public/index.html"; exit 1; }
          test -f public/resume/index.html || { echo "MISSING: public/resume/index.html"; exit 1; }
          test -f public/license/index.html || { echo "MISSING: public/license/index.html"; exit 1; }
          test -f public/sitemap.xml || { echo "MISSING: public/sitemap.xml"; exit 1; }
          test -f public/robots.txt || { echo "MISSING: public/robots.txt"; exit 1; }
          test -f public/404.html || { echo "MISSING: public/404.html"; exit 1; }
          echo "All required output files present."

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"

      - name: HTML validation with htmlhint
        run: npx --yes htmlhint@1 "public/**/*.html" --config .htmlhintrc

      - name: Check for broken internal links
        run: |
          grep -rh 'href="/' public/*.html public/**/*.html 2>/dev/null | \
            grep -oP 'href="\K[^"]+' | \
            sort -u | \
            while read path; do
              clean=$(echo "$path" | cut -d'?' -f1 | cut -d'#' -f1)
              [ -z "$clean" ] && continue
              if [ ! -f "public${clean}" ] && [ ! -f "public${clean}index.html" ]; then
                echo "BROKEN: $clean"
              fi
            done | tee /tmp/broken-links.txt
          if [ -s /tmp/broken-links.txt ]; then
            echo "Broken internal links found:"
            cat /tmp/broken-links.txt
            exit 1
          fi
          echo "All internal links resolve."

      - name: Cache build for integration tests
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: public/
          key: build-${{ github.sha }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-build
          path: public/
          retention-days: 7

  integration-tests:
    name: Integration Tests (${{ matrix.browser }})
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Restore cached build
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: public/
          key: build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm list @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install ${{ matrix.browser }}

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
