<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ .Site.Params.ogImage | absURL }}">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="{{ .Site.Params.twitterID }}">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ .Site.Params.ogImage | absURL }}">

  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = stored === 'dark' || (!stored && prefersDark);
      document.documentElement.classList.add(isDark ? 'dark' : 'light');
    })();
  </script>
  {{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Peter Demirdjian",
    "alternateName": "Pete Demirdjian",
    "jobTitle": "Principal DevOps Engineer",
    "worksFor": { "@type": "Organization", "name": "CarGurus" },
    "alumniOf": { "@type": "CollegeOrUniversity", "name": "Northeastern University" },
    "url": "{{ .Site.BaseURL }}",
    "image": "{{ .Site.Params.ogImage | absURL }}",
    "email": "mailto:code@peterdemirdjian.com",
    "sameAs": ["https://www.linkedin.com/in/peter-demirdjian/"]
  }
  </script>
  {{ end }}
</head>
<body>
  <header>
    <nav>
      <a href="/" class="site-title">{{ .Site.Title }}</a>
      <ul>
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}"{{ if hasPrefix .URL "http" }} rel="noopener" target="_blank"{{ end }}>{{ .Name }}</a>
        </li>
        {{ end }}
        <li>
          <button id="theme-toggle" aria-label="Toggle dark mode">☀</button>
        </li>
      </ul>
    </nav>
  </header>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      var html = document.documentElement;
      function applyTheme(dark) {
        html.classList.toggle('dark', dark);
        html.classList.toggle('light', !dark);
        btn.textContent = dark ? '☀' : '☾';
      }
      applyTheme(html.classList.contains('dark'));
      btn.addEventListener('click', function () {
        var nowDark = !html.classList.contains('dark');
        localStorage.setItem('theme', nowDark ? 'dark' : 'light');
        applyTheme(nowDark);
      });
    })();
  </script>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>
      © {{ now.Format "2006" }} Peter Demirdjian · Licensed under
      <a rel="license" href="/license/">CC BY-NC-ND 4.0</a>
    </p>
  </footer>
</body>
</html>
